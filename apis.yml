  - type: Features
    data:
      - name: High-Speed Machining
        description: >-
          Optimized toolpath strategies for high-speed machining operations
          including trochoidal milling, constant Z, and rest machining for
          aerospace and automotive part manufacturing.
      - name: 5-Axis Machining
        description: >-
          Simultaneous 5-axis toolpath generation for complex sculptured
          surfaces, undercuts, and deep cavities in mold, die, and
          aerospace component manufacturing.
      - name: Macro Automation
        description: >-
          Record and replay macro scripts to automate repetitive CAM
          programming tasks, standardize manufacturing processes, and
          reduce programming time for similar part families.
      - name: Python Scripting
        description: >-
          Python API for programmatic control of toolpath generation,
          manufacturing data management, and integration with
          broader manufacturing software ecosystems.
      - name: Machine Simulation
        description: >-
          Full machine kinematics simulation to verify toolpaths, detect
          collisions, and validate CNC programs before cutting to prevent
          costly machine crashes and scrap parts.
      - name: Post-Processor Support
        description: >-
          Flexible post-processor framework for generating machine-specific
          G-code output for a wide variety of CNC machines and controllers.
  - type: UseCases
    data:
      - name: Aerospace Part Machining
        description: >-
          Programming complex aerospace structural components, engine parts,
          and airframe components from titanium, aluminum, and composites
          with 5-axis machining strategies.
      - name: Mold and Die Manufacturing
        description: >-
          Generating high-quality toolpaths for injection molds, die casting
          tools, and stamping dies with complex surface finishes and tight tolerances.
      - name: Automotive Prototyping
        description: >-
          Rapid prototyping and short-run production of automotive body panels,
          interior components, and powertrain parts using high-speed machining.
      - name: CAM Automation
        description: >-
          Automating CAM programming workflows using Python and macro APIs to
          reduce programming time for families of similar manufacturing parts.
      - name: ERP and MES Integration
        description: >-
          Integrating PowerMill with ERP and Manufacturing Execution Systems
          via .NET/COM APIs to automate production scheduling and manufacturing data exchange.
  - type: Integrations
    data:
      - name: Autodesk Inventor
        description: >-
          Direct integration with Autodesk Inventor for importing CAD models
          and associative design-to-manufacturing workflows.
      - name: Autodesk Fusion
        description: >-
          Integration with Autodesk Fusion for cloud-connected design and
          manufacturing workflows combining CAD and CAM capabilities.
      - name: SAP and ERP Systems
        description: >-
          COM/API-based integration with SAP and other ERP systems for
          production scheduling, work order management, and manufacturing data exchange.
      - name: STEP and IGES
        description: >-
          Neutral CAD file format support enabling data exchange with any
          CAD system via STEP and IGES file formats.
