aid: autodesk-powermill
name: Autodesk PowerMill
description: >-
  Autodesk PowerMill is a leading CAM (Computer-Aided Manufacturing) software
  solution for high-speed and 5-axis CNC machining. It is used by aerospace,
  automotive, mold and die, and precision engineering industries to generate
  toolpaths for complex part manufacturing. PowerMill provides multiple
  programming interfaces including Macro scripts, Python API, and .NET/COM
  interfaces for automating manufacturing workflows, customizing toolpath
  generation, and integrating with broader manufacturing execution systems.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - 5-Axis Machining
  - CAM
  - CNC
  - Machining
  - Manufacturing
  - Aerospace
  - Automotive
  - Toolpath Generation
url: >-
  https://raw.githubusercontent.com/api-evangelist/autodesk-powermill/refs/heads/main/apis.yml
created: '2025-01-01'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: autodesk-powermill:powermill-macro-api
    name: PowerMill Macro API
    description: >-
      The PowerMill Macro API provides an automation interface using macro
      commands to control PowerMill operations and workflows for CNC machining
      automation. Macros can automate repetitive toolpath generation tasks,
      batch processing of manufacturing data, and integration with post-processors.
    humanURL: https://www.autodesk.com/products/powermill/overview
    baseURL: https://local-powermill-instance
    tags:
      - Automation
      - Macros
      - Scripting
      - CNC
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/PWRML/2024/ENU/

  - aid: autodesk-powermill:powermill-python-api
    name: PowerMill Python API
    description: >-
      The PowerMill Python API provides a Python-based interface for automating
      PowerMill processes and customizing machining workflows. The Python API
      enables programmatic control of toolpath creation, machine simulation,
      and manufacturing data management within PowerMill.
    humanURL: https://www.autodesk.com/products/powermill/overview
    baseURL: https://local-powermill-instance
    tags:
      - Automation
      - Python
      - Scripting
      - CNC
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/PWRML/2024/ENU/
      - type: SDK
        url: https://github.com/Autodesk/PowerShell-Suite

  - aid: autodesk-powermill:powermill-dotnet-com-api
    name: PowerMill .NET / COM API
    description: >-
      The PowerMill .NET and COM API provides an object model for integrating
      PowerMill with Windows applications, ERP systems, and manufacturing
      execution systems. Enables external applications to drive PowerMill
      toolpath generation and access machining data programmatically.
    humanURL: https://www.autodesk.com/products/powermill/overview
    baseURL: https://local-powermill-instance
    tags:
      - Automation
      - COM
      - .NET
      - Integration
    properties:
      - type: Documentation
        url: https://help.autodesk.com/view/PWRML/2024/ENU/

